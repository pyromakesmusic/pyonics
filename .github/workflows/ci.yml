name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]   # triggers release on version tags
  pull_request:

jobs:
  test:
    runs-on: windows-latest  # important for your dependency stack

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv run python -m build

      - name: Test install from wheel
        run: |
          ls dist
          pip install $(ls dist/*.whl)
          python -c "import pyonics"

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --verbose